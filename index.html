<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بازی کلیک حرفه‌ای</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma;
    overflow:hidden;
}

#menu{
    position:fixed;
    width:100%;
    top:40%;
    text-align:center;
}

button{
    padding:12px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    cursor:pointer;
}

#score{
    position:fixed;
    top:10px;
    left:10px;
    font-size:22px;
}

#life{
    position:fixed;
    top:10px;
    right:10px;
    font-size:22px;
}

.target{
    position:absolute;
    width:60px;
    height:60px;
    background:red;
    border-radius:50%;
}
</style>
</head>

<body>

<div id="menu">
    <h1>🎮 بازی کلیک</h1>
    <button onclick="startGame()">شروع</button>
</div>

<div id="score">امتیاز: 0</div>
<div id="life">❤️ 3</div>
<script>
let score = 0;
let life = 3;
let running = false;
let spawnTimer;

function updateUI(){
    document.getElementById("score").innerText = "امتیاز: " + score;
    document.getElementById("life").innerText = "❤️ " + life;
}

function startGame(){
    score = 0;
    life = 3;
    running = true;

    updateUI();
    document.getElementById("menu").style.display = "none";

    spawnTimer = setInterval(spawnTarget, 900);
}

function spawnTarget(){
    if(!running) return;

    const t = document.createElement("div");
    t.className = "target";

    t.style.left = Math.random() * (window.innerWidth - 60) + "px";
    t.style.top = Math.random() * (window.innerHeight - 60) + "px";

    t.onclick = () => {
        if(!running) return;
        score++;
        updateUI();
        t.remove();
    };

    document.body.appendChild(t);

    setTimeout(() => {
        if(document.body.contains(t)){
            t.remove();
            life--;
            updateUI();

            if(life <= 0){
                gameOver();
            }
        }
    }, 1200);
}

function gameOver(){
    running = false;
    clearInterval(spawnTimer);

    document.querySelectorAll(".target").forEach(e => e.remove());

    document.getElementById("menu").style.display = "block";

    alert("💀 Game Over\nامتیاز: " + score);
}
</script>
</body>
</html>
