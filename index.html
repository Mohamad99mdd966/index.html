<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بازی موش و گربه</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma;
    overflow:hidden;
}

#menu{
    position:fixed;
    width:100%;
    top:40%;
    text-align:center;
}

button{
    padding:12px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    cursor:pointer;
}

#score{
    position:fixed;
    top:10px;
    left:10px;
    font-size:22px;
}

#life{
    position:fixed;
    top:10px;
    right:10px;
    font-size:22px;
}

.target{
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="menu">
    <h1>🐭 موش و گربه</h1>
    <button onclick="startGame()">شروع بازی</button>
</div>

<div id="score">امتیاز: 0</div>
<div id="life">❤️ 3</div>
<script>
let score = 0;
let life = 3;
let running = false;
let spawnTimer;

// آپدیت امتیاز و جون
function updateUI(){
    document.getElementById("score").innerText = "امتیاز: " + score;
    document.getElementById("life").innerText = "❤️ " + life;
}

// شروع بازی
function startGame(){
    score = 0;
    life = 3;
    running = true;

    updateUI();
    document.getElementById("menu").style.display = "none";

    spawnTimer = setInterval(spawnObject, 800);
}

// ساخت موش / گربه / تور
function spawnObject(){
    if(!running) return;

    const obj = document.createElement("div");

    let r = Math.random();

    // تعیین نوع شیء
    if(r < 0.6){
        obj.dataset.type = "mouse";
        obj.style.background = "gray";
    }
    else if(r < 0.9){
        obj.dataset.type = "cat";
        obj.style.background = "orange";
    }
    else{
        obj.dataset.type = "trap";
        obj.style.background = "black";
    }

    obj.className = "target";

    // جای تصادفی
    obj.style.left = Math.random() * (window.innerWidth - 60) + "px";
    obj.style.top = Math.random() * (window.innerHeight - 60) + "px";

    // کلیک روی هدف
    obj.onclick = () => {
        if(!running) return;

        if(obj.dataset.type === "mouse"){
            score++;
        }
        else if(obj.dataset.type === "cat"){
            life--;
        }
        else if(obj.dataset.type === "trap"){
            life -= 2;
        }

        updateUI();
        obj.remove();

        if(life <= 0){
            gameOver();
        }
    };

    document.body.appendChild(obj);

    // اگر کلیک نشد حذف شود
    setTimeout(() => {
        if(document.body.contains(obj)){
            obj.remove();
        }
    }, 1200);
}

// پایان بازی
function gameOver(){
    running = false;
    clearInterval(spawnTimer);

    document.querySelectorAll(".target").forEach(e => e.remove());

    document.getElementById("menu").style.display = "block";

    alert("💀 Game Over\nامتیاز: " + score);
}
</script>
</body>
</html>
